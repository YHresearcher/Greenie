name: Build Astro Blog into /blog

on:
  push:
    branches: ["main", "master"]
    paths:
      - "astro-blog/**"
      - ".github/workflows/build-astro-blog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro-blog/package.json

      - name: Install dependencies
        working-directory: astro-blog
        run: npm install

      - name: Build Astro blog
        working-directory: astro-blog
        run: npm run build

      - name: Replace /blog output folder
        run: |
          rm -rf blog
          mkdir -p blog
          cp -R astro-blog/dist/. blog/
          touch blog/.nojekyll

      - name: Commit generated blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog
          git diff --cached --quiet && echo "No blog changes" && exit 0
          git commit -m "chore(blog): build Astro blog output"
          git push