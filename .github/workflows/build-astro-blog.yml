name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro-blog/package.json

      - name: Install dependencies
        working-directory: astro-blog
        run: npm install

      - name: Build Astro blog
        working-directory: astro-blog
        run: npm run build

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          # Copy root static files (exclude astro-blog source, node_modules, etc.)
          rsync -av --exclude='astro-blog' --exclude='.git' --exclude='.github' --exclude='node_modules' ./ _site/
          # Copy built blog into /blog
          mkdir -p _site/blog
          cp -R astro-blog/dist/. _site/blog/
          # Ensure .nojekyll exists
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
